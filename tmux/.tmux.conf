# remap prefic C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# vim keys for copy mode
set-window-option -g mode-keys vi

# quickly open new window
bind N new-window

set -g mouse on

# don't rename windows
set-option -g allow-rename off

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# use ctrl-z to synch panes
bind -n C-z setw synchronize-panes

# Smart pane switching with vim-tmux-navigator
# Ctrl+hjkl to navigate between tmux panes and vim windows seamlessly
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
